version: "3.9"

# Las credenciales se leen del archivo `.env` en la raíz del proyecto.
# Si alguna falta, Docker Compose abortará con un error claro. NO usar
# defaults inline (`${VAR:-default}`) con credenciales: hace que herramientas
# de secret-scan (GitGuardian) marquen el archivo como leaked credential.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER es requerido en .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD es requerido en .env}
      POSTGRES_DB: ${DB_NAME:?DB_NAME es requerido en .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL es requerido en .env}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET es requerido en .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET es requerido en .env}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/.pnpm-store
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.pnpm-store
    depends_on:
      - backend

volumes:
  pgdata:
